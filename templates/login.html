<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Organizador de Tarefas - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-wrapper">

    <div class="auth-card">
        <h2>Acessar Conta</h2>
        <p>Preencha os campos abaixo para entrar no painel.</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form action="{{ url_for('login') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" name="email" id="email" placeholder="seuemail@link.com" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" name="senha" id="senha" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn-auth-submit">Entrar</button>
        </form>
        
        <div class="auth-footer">
            <a href="{{ url_for('cadastro') }}">Criar nova conta</a>
            <span style="color: #ced6e0; margin: 0 8px;">|</span>
            <a href="#" onclick="alert('Funcionalidade de recuperação de senha em desenvolvimento.');">Esqueci minha senha</a>
        </div>
    </div>

</body>
</html>
