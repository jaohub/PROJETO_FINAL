<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas - Recuperar Senha</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-container" style="max-width: 400px;">
        <h1>Recuperar Senha</h1>
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 20px;">Informe seu e-mail cadastrado e digite a nova senha do sistema.</p>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-messages">
                    {% for message in messages %}
                        <div class="message-item">
                            <span>{{ message }}</span>
                            <strong class="close-flash" onclick="this.parentElement.style.display='none';">&times;</strong>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <div class="auth-forms">
            <div class="form-box">
                <form action="/recuperar" method="POST">
                    <label for="rec_email">Seu E-mail Cadastrado:</label>
                    <input type="email" id="rec_email" name="email" placeholder="seuemail@link.com" required>

                    <label for="rec_senha">Nova Senha de Acesso:</label>
                    <input type="password" id="rec_senha" name="nova_senha" placeholder="No mínimo 6 caracteres" minlength="6" required>

                    <button type="submit" style="background-color: #e0a800; color: #212529;">Redefinir Senha</button>
                </form>

                <div class="auth-links">
                    <a href="/" class="link-back">← Voltar para o Login</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
