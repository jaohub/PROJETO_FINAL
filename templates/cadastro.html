<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas - Cadastrar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-container" style="max-width: 400px;">
        <h1>Organizador de Tarefas</h1>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-messages">
                    {% for message in messages %}
                        <div class="message-item">
                            <span>{{ message }}</span>
                            <strong class="close-flash" onclick="this.parentElement.style.display='none';">&times;</strong>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <div class="auth-forms">
            <div class="form-box">
                <h2>Criar Conta</h2>
                <form action="/cadastro" method="POST">
                    <label for="cad_nome">Nome Completo:</label>
                    <input type="text" id="cad_nome" name="nome" placeholder="Ex: João Mateus" required>

                    <label for="cad_email">E-mail:</label>
                    <input type="email" id="cad_email" name="email" placeholder="exemplo@email.com" required>

                    <label for="cad_senha">Senha:</label>
                    <input type="password" id="cad_senha" name="senha" placeholder="No mínimo 6 caracteres" minlength="6" required>

                    <button type="submit" class="btn-secondary">Cadastrar</button>
                </form>

                <div class="auth-links">
                    <a href="/" class="link-back">← Voltar para o Login</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
