<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Organizador de Tarefas - Cadastrar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-wrapper">

    <div class="auth-card">
        <h2>Criar Conta</h2>
        <p>Insira seus dados para começar a gerenciar suas tarefas.</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form action="{{ url_for('cadastro') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="nome">Nome Completo:</label>
                <input type="text" name="nome" id="nome" placeholder="Seu nome" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" name="email" id="email" placeholder="seuemail@link.com" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" name="senha" id="senha" placeholder="Crie uma senha segura" required>
            </div>
            <button type="submit" class="btn-auth-submit" style="background-color: #2ecc71;">Finalizar Cadastro</button>
        </form>
        
        <div class="auth-footer">
            <a href="{{ url_for('login') }}">Já tem uma conta? Entrar</a>
        </div>
    </div>

</body>
</html>
