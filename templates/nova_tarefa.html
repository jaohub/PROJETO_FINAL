<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Nova Tarefa — {{ projeto[1] }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="form-page-body">

    <main class="form-container">
        <div class="form-card">
            <header class="form-card-header">
                <span class="form-context">Módulo: {{ projeto[1] }}</span>
                <h2>📌 Criar Nova Atividade</h2>
            </header>

            <form action="{{ url_for('nova_tarefa', projeto_id=projeto[0]) }}" method="POST" class="task-form">
                
                <div class="form-group">
                    <label for="titulo">Título da Tarefa</label>
                    <input type="text" id="titulo" name="titulo" placeholder="O que precisa ser feito?" required autocomplete="off">
                </div>

                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="prioridade">Prioridade</label>
                        <select id="prioridade" name="prioridade">
                            <option value="Baixa">Baixa</option>
                            <option value="Média" selected>Média</option>
                            <option value="Alta">Alta</option>
                        </select>
                    </div>

                    <div class="form-group flex-1">
                        <label for="data_entrega">Prazo Limite</label>
                        <input type="date" id="data_entrega" name="data_entrega">
                    </div>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição / Detalhes</label>
                    <textarea id="descricao" name="descricao" rows="4" placeholder="Adicione observações importantes ou sub-tarefas..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit-task">Adicionar Tarefa</button>
                    <a href="{{ url_for('dashboard_projeto', projeto_id=projeto[0]) }}" class="btn-cancel-task">← Voltar ao Painel</a>
                </div>

            </form>
        </div>
    </main>

</body>
</html>
