<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Atividade</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="form-page-body">

    <div class="form-container">
        <div class="form-card">
            <div class="form-card-header">
                <h2>✏️ Editar Atividade</h2>
            </div>
            
            <form action="{{ url_for('editar_tarefa', tarefa_id=tarefa[0]) }}" method="POST" class="task-form">
                <div class="form-group">
                    <label for="titulo">Título da Tarefa:</label>
                    <input type="text" name="titulo" id="titulo" value="{{ tarefa[1] }}" required autocomplete="off">
                </div>
                
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="status">Status / Coluna:</label>
                        <select name="status" id="status">
                            <option value="A Fazer" {% if tarefa[3] == 'A Fazer' %}selected{% endif %}>A Fazer</option>
                            <option value="Em Andamento" {% if tarefa[3] == 'Em Andamento' %}selected{% endif %}>Em Andamento</option>
                            <option value="Concluído" {% if tarefa[3] == 'Concluído' %}selected{% endif %}>Concluído</option>
                        </select>
                    </div>

                    <div class="form-group flex-1">
                        <label for="prioridade">Prioridade:</label>
                        <select name="prioridade" id="prioridade">
                            <option value="Baixa" {% if tarefa[4] == 'Baixa' %}selected{% endif %}>Baixa</option>
                            <option value="Média" {% if tarefa[4] == 'Média' %}selected{% endif %}>Média</option>
                            <option value="Alta" {% if tarefa[4] == 'Alta' %}selected{% endif %}>Alta</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="data_entrega">Prazo limite:</label>
                    <input type="date" name="data_entrega" id="data_entrega" value="{{ tarefa[5] if tarefa[5] else '' }}">
                </div>
                
                <div class="form-group">
                    <label for="descricao">Descrição / Detalhes:</label>
                    <textarea name="descricao" id="descricao" rows="4">{{ tarefa[2] if tarefa[2] else '' }}</textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-submit-task" style="background-color: #3498db;">Salvar Alterações</button>
                    <a href="{{ url_for('dashboard_projeto', projeto_id=tarefa[6]) }}" class="btn-cancel-task">← Cancelar e Voltar</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
